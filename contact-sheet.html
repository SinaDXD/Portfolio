<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact sheet</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #f7f6f3; color: #15140f; margin: 0; padding: 16px 16px 60px; }
  h1 { font-size: 17px; margin: 0 0 4px; }
  .hint { font-size: 12px; color: #666; margin: 0 0 16px; }
  .nav { font-size: 12px; margin: 0 0 16px; }
  .nav a { margin-right: 10px; color: #2a58d0; text-decoration: none; }
  .sheet { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .it { position: relative; background: #fff; border: 1px solid #ddd; }
  .it img { width: 100%; display: block; }
  .n { position: absolute; top: 6px; left: 6px; background: #15140f; color: #fff; font-size: 15px; font-weight: 700; padding: 3px 9px; border-radius: 3px; }
  .f { font-size: 11px; color: #555; padding: 4px 6px; word-break: break-all; }
</style>
</head>
<body>
<h1 id="t"></h1>
<p class="hint">Each image is numbered. Just tell me the order you want, e.g. "4, 2, 7 — drop the rest". Filenames are under each.</p>
<div class="nav" id="nav"></div>
<div class="sheet" id="s"></div>
<script>
(async () => {
  const data = await (await fetch('allimages.json?cb=' + Date.now())).json();
  const key = new URLSearchParams(location.search).get('p') || Object.keys(data)[0];
  document.getElementById('nav').innerHTML = Object.keys(data).map(k =>
    '<a href="?p=' + k + '">' + k + '</a>').join('');
  const p = data[key];
  document.getElementById('t').textContent = key + ' — ' + p.title + ' (' + p.images.length + ' images)';
  document.getElementById('s').innerHTML = p.images.map((src, i) =>
    '<div class="it"><span class="n">' + (i + 1) + '</span><img loading="lazy" src="' + src + '"><div class="f">' + src.split('/').pop() + '</div></div>'
  ).join('');
})();
</script>
</body>
</html>
