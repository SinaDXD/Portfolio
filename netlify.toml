# Static site — no build step. Netlify serves the repo root as-is.
[build]
  publish = "."

# Long-cache the fingerprinted assets (they're versioned via ?v= query strings)
[[headers]]
  for = "/projects/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
